server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # Symfony public/ (monté via volume)
    root /var/www/html/public;
    index index.php;

    # Healthcheck
    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- Symfony: assets ----
    location ^~ /bundles/ {
        try_files $uri =404;
    }

    location ^~ /assets/ {
        try_files $uri =404;
    }

    # ---- Symfony: Admin ----
    location ^~ /admin {
        try_files $uri /index.php$uri$is_args$args;
    }

    # ---- Symfony: API ----
    # ---- Symfony: API (FORCÉ vers index.php) ----
    location ^~ /api {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param DOCUMENT_ROOT $document_root;

        # ✅ essentiel pour que Symfony voie /api/...
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param PATH_INFO $uri;

        # ✅ pour que Symfony voie host/scheme corrects
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;

        fastcgi_pass backend:9000;
        fastcgi_read_timeout 120s;
    }

    # ---- Symfony front controller (PHP-FPM) ----
    location ~ ^/index\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.*)$;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_pass backend:9000;
        fastcgi_read_timeout 120s;
        internal;
    }

    location ^~ /uploads/ {
        alias /var/www/html/public/uploads/;
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Bloquer l'accès direct aux autres .php
    location ~ \.php$ {
        return 404;
    }

    location ^~ /_next/static/ {
    proxy_pass http://frontend:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    expires 1y;
    add_header Cache-Control "public, immutable";
    }

    # ---- Frontend Next.js: tout le reste ----
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # ✅ timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;


        # ❌ enlève ces deux lignes (ou mets-les seulement pour /_next/webpack-hmr)
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
    }

}
