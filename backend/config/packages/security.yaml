security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

  role_hierarchy:
    ROLE_ADMIN: [ROLE_PREMIUM, ROLE_USER]
    ROLE_PREMIUM: [ROLE_USER]

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    # ✅ LOGIN JWT : /api/login_check
    login:
      pattern:  ^/api/login_check
      stateless: true
      provider: app_user_provider
      json_login:
        check_path: /api/login_check
        username_path: email
        password_path: password
        success_handler: lexik_jwt_authentication.handler.authentication_success
        failure_handler: lexik_jwt_authentication.handler.authentication_failure

    # ✅ API protégée par JWT
    api:
      pattern: ^/api
      stateless: true
      provider: app_user_provider
      jwt: ~

  access_control:
    - { path: ^/api/logout$, roles: PUBLIC_ACCESS }
    - { path: ^/api/refresh$, roles: PUBLIC_ACCESS }
    - { path: ^/api/billing/webhook, roles: PUBLIC_ACCESS }  
    - { path: ^/api/register, roles: PUBLIC_ACCESS }
    - { path: ^/api/login_check, roles: PUBLIC_ACCESS }
    - { path: ^/api/admin, roles: ROLE_ADMIN }
    - { path: ^/api/premium-briefs, roles: ROLE_PREMIUM }
    - { path: ^/api, roles: PUBLIC_ACCESS }
    - { path: ^/api/password/forgot, roles: PUBLIC_ACCESS }
    - { path: ^/api/password/reset, roles: PUBLIC_ACCESS }
    - { path: ^/api/footer-links, roles: PUBLIC_ACCESS }

