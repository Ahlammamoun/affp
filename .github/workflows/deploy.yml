name: Deploy to VPS on prod branch

on:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH key (from base64)
        shell: bash
        run: |
          set -e
          mkdir -p .github/ssh
          echo "${{ secrets.SERVER_SSH_KEY_B64 }}" | base64 -d > .github/ssh/id_ed25519
          chmod 600 .github/ssh/id_ed25519

      - name: Test SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key_path: /github/workspace/.github/ssh/id_ed25519
          script: |
            echo "SSH OK"

      - name: Upload project
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key_path: /github/workspace/.github/ssh/id_ed25519
          source: "."
          target: "/var/www/affp"
          rm: true

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key_path: /github/workspace/.github/ssh/id_ed25519
          script: |
            set -e
            cd /var/www/affp
            docker compose down || true
            docker compose up -d --build
            docker image prune -f
