name: Deploy to VPS on prod branch

on:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key + test
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST_RAW: ${{ secrets.SERVER_HOST }}
        run: |
          set -euo pipefail

          # sanitize HOST (remove CR/LF, spaces, ssh://, and accidental :port)
          HOST="$(printf '%s' "$HOST_RAW" | tr -d '\r\n' | sed 's#^ssh://##' | sed 's/:22$//')"

          echo "HOST_RAW=$(printf '%s' "$HOST_RAW" | cat -A)"
          echo "HOST=$HOST"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes -o PreferredAuthentications=publickey \
            -p 22 ubuntu@"$HOST" 'echo OK'

      - name: Upload project with rsync
        shell: bash
        env:
          HOST_RAW: ${{ secrets.SERVER_HOST }}
        run: |
          set -euo pipefail
          HOST="$(printf '%s' "$HOST_RAW" | tr -d '\r\n' | sed 's#^ssh://##' | sed 's/:22$//')"

          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519 -p 22" ./ ubuntu@"$HOST":/var/www/affp/

      - name: Deploy on server
        shell: bash
        env:
          HOST_RAW: ${{ secrets.SERVER_HOST }}
        run: |
          set -euo pipefail
          HOST="$(printf '%s' "$HOST_RAW" | tr -d '\r\n' | sed 's#^ssh://##' | sed 's/:22$//')"

          ssh -i ~/.ssh/id_ed25519 -p 22 ubuntu@"$HOST" <<'EOF'
            set -e
            cd /var/www/affp
            docker compose down || true
            docker compose up -d --build
            docker image prune -f
          EOF
