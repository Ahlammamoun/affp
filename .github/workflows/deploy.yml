name: Deploy to VPS on prod branch

on:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        env:
          HOST_RAW: ${{ secrets.SERVER_HOST }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Sanitize host: remove CR/LF and optional ssh:// prefix
          HOST="$(printf '%s' "$HOST_RAW" | tr -d '\r\n' | sed 's#^ssh://##')"

          # Basic validation to catch common mistakes early
          if printf '%s' "$HOST" | grep -qE '[[:space:]]'; then
            echo "ERROR: SERVER_HOST contains whitespace: '$(printf '%s' "$HOST" | cat -A)'" >&2
            exit 1
          fi
          if printf '%s' "$HOST" | grep -qE '[@/"]'; then
            echo "ERROR: SERVER_HOST must be ONLY a hostname or IP (no user/path/quotes): '$HOST'" >&2
            exit 1
          fi

          echo "Using HOST=$HOST"
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Upload project (rsync)
        shell: bash
        env:
          HOST_RAW: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail

          HOST="$(printf '%s' "$HOST_RAW" | tr -d '\r\n' | sed 's#^ssh://##')"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p 22" \
            ./ "${USER}@${HOST}:/var/www/affp/"

      - name: Deploy on server
        shell: bash
        env:
          HOST_RAW: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail

          HOST="$(printf '%s' "$HOST_RAW" | tr -d '\r\n' | sed 's#^ssh://##')"

          ssh -i ~/.ssh/id_ed25519 -p 22 "${USER}@${HOST}" <<'EOF'
            set -e
            cd /var/www/affp
            docker compose down || true
            docker compose up -d --build
            docker image prune -f
          EOF
