name: Deploy to VPS on prod branch

on:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # write key exactly as provided
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # known_hosts
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          # quick auth test (no password allowed)
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o PreferredAuthentications=publickey -p 22 ubuntu@"$HOST" 'echo OK'

      - name: Upload project with rsync
        shell: bash
        env:
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set -euo pipefail
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519 -p 22" ./ ubuntu@"$HOST":/var/www/affp/

      - name: Deploy on server
        shell: bash
        env:
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p 22 ubuntu@"$HOST" <<'EOF'
            set -e
            cd /var/www/affp
            docker compose down || true
            docker compose up -d --build
            docker image prune -f
          EOF
