name: Deploy to VPS on prod branch

on:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Decode SSH key to env
        id: key
        shell: bash
        run: |
          set -e
          echo "SSH_KEY<<EOF" >> $GITHUB_ENV
          echo "${{ secrets.SERVER_SSH_KEY_B64 }}" | base64 -d >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Test SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key: ${{ env.SSH_KEY }}
          script: |
            echo "SSH OK"

      - name: Upload project
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key: ${{ env.SSH_KEY }}
          source: "."
          target: "/var/www/affp"
          rm: true

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key: ${{ env.SSH_KEY }}
          script: |
            set -e
            cd /var/www/affp
            docker compose down || true
            docker compose up -d --build
            docker image prune -f
