name: Deploy to VPS on prod branch

on:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key file
        shell: bash
        run: |
          set -e
          KEY_FILE="${RUNNER_TEMP}/id_ed25519"
          echo "${{ secrets.SERVER_SSH_KEY_B64 }}" | base64 -d > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          echo "KEY_FILE=$KEY_FILE" >> $GITHUB_ENV

      - name: Test SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key_path: /github/runner_temp/id_ed25519
          script: |
            echo "SSH OK"

      - name: Upload project
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key_path: /github/runner_temp/id_ed25519
          source: "."
          target: "/var/www/affp"
          rm: true

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key_path: /github/runner_temp/id_ed25519
          script: |
            set -e
            cd /var/www/affp
            docker compose down || true
            docker compose up -d --build
            docker image prune -f

